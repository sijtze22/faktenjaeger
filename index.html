             details:"Habeck kündigte ein sozial gerechtes Gebäudeenergiegesetz an. Die neue Regierung flexibilisierte und milderte es ab. Dies führte zu Debatten über die Umsetzung der ursprünglichen Ankündigungen."},
            {id:"habeck-2", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2022-03", promise:"Kein Importstopp russisches Gas – nicht durchzuhalten.", promiseSource:"https://www.tagesschau.de/inland/habeck-gas-importstopp-101.html",
             dateReality:"2025-02", reality:"Pipeline-Importe aus Russland komplett beendet.", realitySource:"https://www.bundesnetzagentur.de/DE/Fachthemen/ElektrizitaetundGas/Gasversorgung/start.html", status:"eingehalten",
             details:"Habeck erklärte 2022 einen Importstopp für russisches Gas als nicht durchhaltbar. Bis 2025 wurde die Abhängigkeit komplett beendet. Dies führte zu Diskussionen über die Entwicklung der Energieversorgung."},
            {id:"habeck-3", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2023", promise:"Kohleausstieg idealerweise auf 2030 vorziehen.", promiseSource:"https://www.tagesschau.de/gruene-kohleausstieg",
             dateReality:"2025-02", reality:"Rheinisches Revier auf 2030 vorgezogen, Ostdeutschland bei 2038.", realitySource:"https://www.bmwk.de/kohleausstieg-stand", status:"teilweise_umgesetzt",
             details:"Habeck wollte den Kohleausstieg idealerweise auf 2030 vorziehen. Im Rheinischen Revier gelang das, im Osten bleibt 2038. Dies führte zu Debatten über den Zeitplan des Ausstiegs."},
            {id:"habeck-4", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2022-07", promise:"Energiepreise stabilisieren und bezahlbar halten.", promiseSource:"https://www.handelsblatt.com/habeck-energiepreise",
             dateReality:"2025-02", reality:"Preisbremsen eingeführt, Preise gesunken aber hoch.", realitySource:"https://www.destatis.de/energiepreise-2025", status:"teilweise_umgesetzt",
             details:"Habeck versprach stabile und bezahlbare Energiepreise. Preisbremsen wurden eingeführt, doch Preise liegen weiter über Vor-Krisen-Niveau. Dies führte zu Diskussionen über die Preisentwicklung."},
            {id:"habeck-5", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",

             dateReality:"2025-02", reality:"Anteil bei ca. 55%, Ausbau schreitet voran.", realitySource:"https://www.umweltbundesamt.de/erneuerbare-2025", status:"teilweise_umgesetzt",
             details:"Habeck setzte sich das Ziel von 80% Erneuerbaren bis 2030. Aktuell liegt der Anteil bei etwa 55%. Dies führte zu Debatten über den Fortschritt beim Ausbau."},
            {id:"habeck-6", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",

             dateReality:"2025-02", reality:"Stellenabbau in Industrie, Rezession.", realitySource:"https://www.iw-koeln.de/industriestandort-analyse", status:"nicht_umgesetzt",
             details:"Habeck versprach, Deutschland werde nicht deindustrialisiert. Realität: Stellenabbau in Schlüsselbranchen und Rezession. Dies führte zu Debatten über die Industriepolitik."},
            {id:"habeck-7", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2022-01", promise:"LNG-Terminals in Rekordzeit bauen.", promiseSource:"https://www.welt.de/habeck-lng-terminals",
             dateReality:"2025-02", reality:"Mehrere Terminals in Betrieb.", realitySource:"https://www.bmwk.de/lng-terminals-status", status:"eingehalten",
             details:"Habeck kündigte LNG-Terminals in Rekordzeit an. Mehrere sind tatsächlich schnell gebaut und in Betrieb. Dies führte zu Diskussionen über die Energieversorgungssicherheit."},

             datePromise:"2023-06", promise:"400.000 neue Wohnungen pro Jahr bauen.", promiseSource:"https://www.spiegel.de/wohnungsbau-ziele",
             dateReality:"2025-02", reality:"Nur ~250.000 fertiggestellt 2024.", realitySource:"https://www.destatis.de/wohnungsbau-statistik", status:"nicht_umgesetzt",
             details:"Habeck setzte das Ziel von 400.000 Wohnungen pro Jahr. 2024 wurden nur etwa 250.000 fertiggestellt. Dies führte zu Debatten über den Wohnungsbau."},
            {id:"habeck-9", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2022-08", promise:"AKW-Laufzeit nur Notmaßnahme für Winter.", promiseSource:"https://www.tagesschau.de/habeck-akw-verlaengerung",
             dateReality:"2025-02", reality:"Letzte AKW 2023 abgeschaltet.", realitySource:"https://www.bmwk.de/atomausstieg-abschluss", status:"eingehalten",
             details:"Habeck erklärte die AKW-Verlängerung als reine Notmaßnahme. Die letzten Kraftwerke wurden 2023 planmäßig abgeschaltet. Dies führte zu Diskussionen über den Atomausstieg."},
            {id:"habeck-10", politician:"habeck", name:"Robert Habeck", photo:"https://upload.wikimedia.org/wikipedia/commons/9/9a/Robert_Habeck_2025.jpg",
             datePromise:"2023-11", promise:"Industriestrompreis einführen.", promiseSource:"https://www.handelsblatt.com/habeck-industriestrompreis",
             dateReality:"2025-02", reality:"Blockiert, nicht umgesetzt.", realitySource:"https://www.bmwk.de/industriestrompreis-scheitern", status:"nicht_umgesetzt",
             details:"Habeck wollte einen Industriestrompreis zur Sicherung der Wettbewerbsfähigkeit. Das Vorhaben wurde von der FDP blockiert. Dies führte zu Debatten über die Industriepolitik."}
        ];

        let currentPolitician = 'all';
        let currentIndex = 0;
        let filteredCards = [...cardData];

        const select = document.getElementById('politicianSelect');
        const track = document.getElementById('swipeTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const indicator = document.getElementById('cardIndicator');
        const headerPhoto = document.getElementById('politicianHeader');
        const updateInfo = document.getElementById('updateInfo');
        const toastContainer = document.getElementById('toastContainer');

        select.onchange = () => {
            currentPolitician = select.value;
            currentIndex = 0;
            filteredCards = currentPolitician === 'all' ? [...cardData] : cardData.filter(c => c.politician === currentPolitician);
            renderCards();
            updateHeader();
            collapseAll();
        };

        function updateHeader() {
            if (currentPolitician !== 'all' && filteredCards.length) {
                const c = filteredCards[0];
                headerPhoto.innerHTML = `<img src="${c.photo}" class="politician-photo" alt="${c.name}"><span class="name">${c.name}</span>`;
            } else {
                headerPhoto.innerHTML = '';
            }
        }

        function renderCards() {
            track.innerHTML = filteredCards.map((c, idx) => `
                <div class="swipe-card">
                    <div class="card">
                        <div class="card-header">
                            <img src="${c.photo}" class="politician-photo" alt="${c.name}">
                            <span class="name">${c.name}</span>
                            <span class="stamp ${c.status}">${c.status === 'nicht_umgesetzt' ? 'Nicht umgesetzt' : c.status === 'eingehalten' ? 'Eingehalten' : 'Teilweise umgesetzt'}</span>
                        </div>
                        <div class="promise">
                            <div class="label">Versprechen</div>
                            <p class="text">"${c.promise}"</p>
                            <a href="${c.promiseSource}" target="_blank" class="source">Quelle</a>
                        </div>
                        <div class="reality">
                            <div class="label">Wirklichkeit</div>
                            <p class="text">${c.reality}</p>
                            <a href="${c.realitySource}" target="_blank" class="source">Quelle</a>
                        </div>
                        <div class="dates">
                            <span>Versprochen: ${c.datePromise}</span>
                            <span>Überprüft: ${c.dateReality}</span>
                        </div>
                        <button class="toggle-btn" onclick="toggleDetails(this)">Mehr Details</button>
                        <div class="details">${c.details || 'Keine weiteren Details verfügbar.'}</div>
                        <button class="share-btn" onclick="shareCard('${encodeURIComponent(c.promise)}', '${encodeURIComponent(c.reality)}', '${c.id}')">Teilen</button>
                    </div>
                </div>
            `).join('');
            updateNav();
            indicator.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
        }

        function toggleDetails(btn) {
            const details = btn.nextElementSibling;
            details.classList.toggle('show');
            btn.textContent = details.classList.contains('show') ? 'Weniger' : 'Mehr Details';
        }

        function collapseAll() {
            document.querySelectorAll('.details.show').forEach(d => {
                d.classList.remove('show');
                d.previousElementSibling.textContent = 'Mehr Details';
            });
        }

        function shareCard(promise, reality, id) {
            const decodedPromise = decodeURIComponent(promise);
            const decodedReality = decodeURIComponent(reality);
            const text = `Versprechen: "${decodedPromise}"\nWirklichkeit: ${decodedReality}\n\nMehr auf Faktenjäger 🇩🇪`;
            const url = window.location.href + `#${id}`;

            if (navigator.share) {
                navigator.share({ title: 'Faktenjäger', text: text, url: url })
                    .catch(err => console.log('Share failed', err));
            } else {
                navigator.clipboard.writeText(text + '\n' + url).then(() => {
                    showToast('Link & Text kopiert!');
                }).catch(() => showToast('Kopieren fehlgeschlagen'));
            }
        }

        function updateNav() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex >= filteredCards.length - 1;
        }

        prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; updatePosition(); } };
        nextBtn.onclick = () => { if (currentIndex < filteredCards.length - 1) { currentIndex++; updatePosition(); } };

        function updatePosition() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            indicator.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
            updateNav();
            collapseAll();
        }

        // Touch swipe
        let startX = 0;
        document.getElementById('swipeContainer').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('swipeContainer').addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) diff > 0 ? nextBtn.click() : prevBtn.click();
        });

        // RSS placeholder - no toast for no updates
        async function checkForUpdates() {
            updateInfo.textContent = "Prüfe Quellen...";
            setTimeout(() => {
                updateInfo.textContent = `Letzte Aktualisierung: ${new Date().toLocaleString('de-DE')}`;
            }, 1500);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            toastContainer.appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // Init
        renderCards();
        updateHeader();
        checkForUpdates();
        setInterval(checkForUpdates, 86400000);

        // PWA install prompt
        window.addEventListener('beforeinstallprompt', e => e.prompt());
    </script>
</body>
</html>
