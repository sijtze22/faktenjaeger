        .update { color:var(--muted); font-size:0.8rem; margin-top:4px; }
        .leaderboard { padding:12px 0; background:#1a1a1a; border-bottom:1px solid var(--border); text-align:center; }
        .leaderboard-grid { display:flex; justify-content:center; flex-wrap:wrap; gap:16px; margin-top:12px; }
        .leader-item { text-align:center; min-width:140px; }
        .leader-name { font-size:1rem; font-weight:600; color:var(--gold); margin:6px 0; }
        .bar-container { height:80px; width:100%; background:#333; border-radius:4px; overflow:hidden; position:relative; display:flex; }
        .bar-red { background:var(--red); height:100%; transition:width 0.5s ease; }
        .bar-green { background:var(--green); height:100%; transition:width 0.5s ease; }
        .bar-label { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:0.8rem; color:#fff; font-weight:bold; text-shadow:0 0 3px #000; }
        main { padding:12px; max-width:1200px; margin:0 auto; }
        .swipe-container { overflow:hidden; touch-action:pan-y; }
        .swipe-track { display:flex; transition:transform 0.4s ease; }
        .swipe-card { flex:0 0 100%; padding:0 8px; }
        .card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); }
        .card-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
        .name { font-size:1.1rem; font-weight:600; color:var(--gold); }
        .stamp { padding:5px 10px; border-radius:4px; font-size:0.75rem; font-weight:bold; border:2px solid; }
        .nicht { color:var(--red); border-color:var(--red); background:rgba(239,68,68,0.1); }
        .eingehalten { color:var(--green); border-color:var(--green); background:rgba(34,197,94,0.1); }
        .teilweise { color:var(--yellow); border-color:var(--yellow); background:rgba(212,175,55,0.1); }
        .promise, .reality { margin:12px 0; }
        .label { font-size:0.8rem; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
        .text { padding-left:12px; border-left:3px solid; }
        .promise .text { border-color:var(--gold); font-style:italic; }
        .reality .text { border-color:var(--muted); }
        .source { color:var(--gold); font-size:0.85rem; display:block; margin-top:6px; text-decoration:none; }
        .dates { display:flex; justify-content:space-between; font-size:0.8rem; color:var(--muted); margin-top:12px; border-top:1px solid var(--border); padding-top:10px; }
        .toggle-btn, .share-btn {
            background:transparent; border:1px solid var(--gold); color:var(--gold); padding:8px 16px; border-radius:6px;
            cursor:pointer; font-size:0.95rem; margin-top:12px; margin-right:8px;
        }
        .toggle-btn {
            background:var(--gold); 
            color:#121212; 
            font-weight:bold; 
            padding:12px 20px; 
            font-size:1.05rem; 
            width:100%; 
            text-align:center; 
            margin:16px 0 8px; 
            border:none;
        }
        .toggle-btn:hover { opacity:0.9; }
        .details { margin-top:12px; padding:16px; background:rgba(212,175,55,0.08); border-radius:8px; font-size:0.95rem; line-height:1.6; display:none; }
        .details.show { display:block; }
        .nav { display:flex; justify-content:center; gap:24px; margin:12px 0; }
        .btn { background:var(--card); border:2px solid var(--gold); color:var(--gold); width:44px; height:44px; border-radius:50%; font-size:1.3rem; cursor:pointer; }
        .btn:disabled { opacity:0.3; cursor:not-allowed; }
        .indicator { text-align:center; color:var(--muted); font-size:0.9rem; }
        footer { padding:20px 16px; text-align:center; color:var(--muted); font-size:0.75rem; background:var(--card); border-top:1px solid var(--border); }

        .toast { background:var(--card); border:1px solid var(--gold); padding:10px 16px; border-radius:8px; margin-top:12px; box-shadow:0 4px 20px rgba(0,0,0,0.5); transform:translateY(-100%); opacity:0; transition:all 0.3s ease; }

             details:"Lauterbach kündigte 2021 die flächendeckende Einführung der digitalen Patientenakte bis 2022 an. Bis 2026 ist die ePA noch nicht überall verfügbar. Dies führte zu Debatten über den Fortschritt der Digitalisierung."},
            {id:"lauterbach-9", politician:"lauterbach", name:"Karl Lauterbach", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Karl_Lauterbach_2021.jpg/800px-Karl_Lauterbach_2021.jpg",
             datePromise:"2022", promise:"Pflegekräfte besser bezahlen.", promiseSource:"https://www.bundesgesundheitsministerium.de/pflegegehalt-2022",
             dateReality:"2025", reality:"Tarifsteigerungen, aber viele unter Tarif.", realitySource:"https://www.tagesschau.de/inland/pflegegehalt-2025", status:"teilweise_umgesetzt",
             details:"Lauterbach versprach bessere Bezahlung für Pflegekräfte. Tarifsteigerungen kamen, doch viele arbeiten unter Tarif. Dies führte zu Debatten über die tatsächliche Verbesserung."},
            {id:"lauterbach-10", politician:"lauterbach", name:"Karl Lauterbach", photo:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Karl_Lauterbach_2021.jpg/800px-Karl_Lauterbach_2021.jpg",
             datePromise:"2021", promise:"Corona-App ohne Zwang zur Nutzung.", promiseSource:"https://www.bundesgesundheitsministerium.de/corona-app-2021",
             dateReality:"2022", reality:"Druck zur Nutzung in Gastronomie und Veranstaltungen.", realitySource:"https://www.tagesschau.de/inland/corona-app-2022", status:"teilweise_umgesetzt",
             details:"Lauterbach betonte 2021 die freiwillige Nutzung der Corona-App. Später gab es Druck zur Nutzung in Gastronomie und Veranstaltungen. Dies führte zu Debatten über die Freiwilligkeit."}
        ];

        let currentPolitician = 'all';
        let currentIndex = 0;
        let filteredCards = [...cardData];

        const select = document.getElementById('politicianSelect');
        const track = document.getElementById('swipeTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const indicator = document.getElementById('cardIndicator');
        const headerPhoto = document.getElementById('politicianHeader');
        const updateInfo = document.getElementById('updateInfo');
        const toastContainer = document.getElementById('toastContainer');
        const leaderboardDiv = document.getElementById('leaderboard');

        select.onchange = () => {
            currentPolitician = select.value;
            currentIndex = 0;
            filteredCards = currentPolitician === 'all' ? [...cardData] : cardData.filter(c => c.politician === currentPolitician);
            renderCards();
            updateHeader();
            collapseAll();
            renderLeaderboard();
        };

        function updateHeader() {
            if (currentPolitician !== 'all' && filteredCards.length) {
                const c = filteredCards[0];
                headerPhoto.innerHTML = `<img src="${c.photo}" class="politician-photo" alt="${c.name}"><span class="name">${c.name}</span>`;
            } else {
                headerPhoto.innerHTML = '';
            }
        }

        function renderCards() {
            track.innerHTML = filteredCards.map((c, idx) => `
                <div class="swipe-card">
                    <div class="card">
                        <div class="card-header">
                            <img src="${c.photo}" class="politician-photo" alt="${c.name}">
                            <span class="name">${c.name}</span>
                            <span class="stamp ${c.status}">${c.status === 'nicht_umgesetzt' ? 'Nicht umgesetzt' : c.status === 'eingehalten' ? 'Eingehalten' : 'Teilweise umgesetzt'}</span>
                        </div>
                        <div class="promise">
                            <div class="label">Versprechen</div>
                            <p class="text">"${c.promise}"</p>
                            <a href="${c.promiseSource}" target="_blank" class="source">Quelle</a>
                        </div>
                        <div class="reality">
                            <div class="label">Wirklichkeit</div>
                            <p class="text">${c.reality}</p>
                            <a href="${c.realitySource}" target="_blank" class="source">Quelle</a>
                        </div>
                        <div class="dates">
                            <span>Versprochen: ${c.datePromise}</span>
                            <span>Überprüft: ${c.dateReality}</span>
                        </div>
                        <button class="toggle-btn" onclick="toggleDetails(this)">Mehr Details</button>
                        <div class="details">${c.details || 'Keine weiteren Details verfügbar.'}</div>
                        <button class="share-btn" onclick="shareCard('${encodeURIComponent(c.promise)}', '${encodeURIComponent(c.reality)}', '${c.id}')">Teilen</button>
                    </div>
                </div>
            `).join('');
            updateNav();
            indicator.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
        }

        function renderLeaderboard() {
            leaderboardDiv.innerHTML = '<h2 style="margin-bottom:12px;">Umsetzungs-Rangliste</h2>';
            const stats = {};
            cardData.forEach(c => {
                if (!stats[c.politician]) stats[c.politician] = { name: c.name, total: 0, nicht: 0, eingehalten: 0 };
                stats[c.politician].total++;
                if (c.status === 'nicht_umgesetzt') stats[c.politician].nicht++;
                if (c.status === 'eingehalten') stats[c.politician].eingehalten++;
            });

            const items = Object.values(stats).map(s => {
                const redPct = (s.nicht / s.total) * 100;
                const greenPct = (s.eingehalten / s.total) * 100;
                return { name: s.name, redPct, greenPct, total: s.total };
            }).sort((a, b) => b.redPct - a.redPct); // highest red first

            const grid = document.createElement('div');
            grid.className = 'leaderboard-grid';
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'leader-item';
                div.innerHTML = `
                    <div class="leader-name">${item.name}</div>
                    <div class="bar-container">
                        <div class="bar-red" style="width:${item.redPct}%"></div>
                        <div class="bar-green" style="width:${item.greenPct}%"></div>
                        <div class="bar-label">${Math.round(item.redPct)}% / ${Math.round(item.greenPct)}%</div>
                    </div>
                `;
                grid.appendChild(div);
            });
            leaderboardDiv.appendChild(grid);
        }

        function toggleDetails(btn) {
            const details = btn.nextElementSibling;
            details.classList.toggle('show');
            btn.textContent = details.classList.contains('show') ? 'Weniger' : 'Mehr Details';
        }

        function collapseAll() {
            document.querySelectorAll('.details.show').forEach(d => {
                d.classList.remove('show');
                d.previousElementSibling.textContent = 'Mehr Details';
            });
        }

        function shareCard(promise, reality, id) {
            const decodedPromise = decodeURIComponent(promise);
            const decodedReality = decodeURIComponent(reality);
            const text = `Versprechen: "${decodedPromise}"\nWirklichkeit: ${decodedReality}\n\nMehr auf Faktenjäger 🇩🇪`;
            const url = window.location.href + `#${id}`;

            if (navigator.share) {
                navigator.share({ title: 'Faktenjäger', text: text, url: url })
                    .catch(err => console.log('Share failed', err));
            } else {
                navigator.clipboard.writeText(text + '\n' + url).then(() => {
                    showToast('Link & Text kopiert!');
                }).catch(() => showToast('Kopieren fehlgeschlagen'));
            }
        }

        function updateNav() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex >= filteredCards.length - 1;
        }

        prevBtn.onclick = () => { if (currentIndex > 0) { currentIndex--; updatePosition(); } };
        nextBtn.onclick = () => { if (currentIndex < filteredCards.length - 1) { currentIndex++; updatePosition(); } };

        function updatePosition() {
            track.style.transform = `translateX(-${currentIndex * 100}%)`;
            indicator.textContent = `${currentIndex + 1} / ${filteredCards.length}`;
            updateNav();
            collapseAll();
        }

        // Touch swipe
        let startX = 0;
        document.getElementById('swipeContainer').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('swipeContainer').addEventListener('touchend', e => {
            const diff = startX - e.changedTouches[0].clientX;
            if (Math.abs(diff) > 50) diff > 0 ? nextBtn.click() : prevBtn.click();
        });

        // RSS placeholder - no toast for no updates
        async function checkForUpdates() {
            updateInfo.textContent = "Prüfe Quellen...";
            setTimeout(() => {
                updateInfo.textContent = `Letzte Aktualisierung: ${new Date().toLocaleString('de-DE')}`;
            }, 1500);
        }

        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            toastContainer.appendChild(t);
            setTimeout(() => t.classList.add('show'), 100);
            setTimeout(() => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // Init
        renderCards();
        updateHeader();
        renderLeaderboard();
        checkForUpdates();
        setInterval(checkForUpdates, 86400000);

        // PWA install prompt
        window.addEventListener('beforeinstallprompt', e => e.prompt());

        // Force reload on focus / pull-to-refresh
        window.addEventListener('focus', () => location.reload(true));
    </script>
</body>
</html>
